name: test

on:
  push:
  pull_request:

jobs:
  dotnet-and-poi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Run tests (including POI interop)
        env:
          POI_INTEROP_REQUIRED: '1'
        run: |
          dotnet test

